; Custom php.ini for SignBridge
; This file enables required extensions without needing to modify the system php.ini

extension_dir = "C:\Program Files\php-8.3.8\ext"

extension=curl
extension=gd
extension=mbstring
extension=openssl
extension=pdo_mysql

; Performance and Error reporting
display_errors = On
error_reporting = E_ALL
max_execution_time = 30
memory_limit = 128M
post_max_size = 8M
upload_max_filesize = 2M
